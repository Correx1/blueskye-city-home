<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Blueskye City Home | Premium Luxury Real Estate & Properties</title>
    <meta name="title" content="Blueskye City Home | Premium Luxury Real Estate & Properties" />
    <meta name="description" content="Discover exquisite villas, modern penthouses, and premium apartments. Blueskye City Home offers the finest selection of curated luxury properties." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Blueskye City Home | Premium Luxury Real Estate" />
    <meta property="og:description" content="Discover exquisite villas, modern penthouses, and premium apartments. Blueskye City Home offers the finest selection of curated luxury properties." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Boxicons (Outline/Regular Icons) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js Library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="transition-colors duration-300 antialiased selection:bg-primary-600 selection:text-white">
    <div id="app" class="min-h-screen flex flex-col">
      <!-- Navbar component -->
      <app-navbar></app-navbar>
      
      <!-- Main Content Dynamic Container -->
      <main id="main-content" class="grow pt-16"></main>
      
      <!-- Footer component -->
      <!-- Footer component -->
      <footer class="relative bg-slate-950 text-slate-400 py-10 pb-4 border-t border-slate-900 overflow-hidden">
        
        <!-- Large Transparent Watermark Background Text -->
        <div class="absolute inset-x-0 bottom-8 flex items-center justify-center pointer-events-none select-none overflow-hidden opacity-[0.03]">
          <span class="text-[15vw] font-black tracking-widest text-white uppercase select-none leading-none font-display">BLUESKYE</span>
        </div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          
          <!-- Top Row: Social Media Icons & Newsletter -->
          <div class="flex flex-col sm:flex-row items-center justify-between pb-6 mb-8 border-b border-slate-900 gap-6">
            <!-- Social Icons (Visible outline badges with inline SVGs to ensure rendering) -->
            <div class="flex items-center gap-3">
              <a href="#" class="h-9 w-9 rounded-full border border-slate-700 flex items-center justify-center text-slate-300 hover:text-white hover:border-white hover:bg-slate-900 transition-all duration-300 shadow-sm" aria-label="Facebook">
                <svg class="w-4 h-4 text-slate-300 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd"></path>
                </svg>
              </a>
              <a href="#" class="h-9 w-9 rounded-full border border-slate-700 flex items-center justify-center text-slate-300 hover:text-white hover:border-white hover:bg-slate-900 transition-all duration-300 shadow-sm" aria-label="Twitter">
                <svg class="w-4 h-4 text-slate-300 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                </svg>
              </a>
              <a href="#" class="h-9 w-9 rounded-full border border-slate-700 flex items-center justify-center text-slate-300 hover:text-white hover:border-white hover:bg-slate-900 transition-all duration-300 shadow-sm" aria-label="Instagram">
                <svg class="w-4 h-4 text-slate-300 hover:text-white transition-colors" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                  <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                  <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
              </a>
              <a href="#" class="h-9 w-9 rounded-full border border-slate-700 flex items-center justify-center text-slate-300 hover:text-white hover:border-white hover:bg-slate-900 transition-all duration-300 shadow-sm" aria-label="LinkedIn">
                <svg class="w-4 h-4 text-slate-300 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd"></path>
                </svg>
              </a>
            </div>

            <!-- Highly Obvious Newsletter Subscribe form with Header Title -->
            <div class="flex flex-col gap-2 w-full sm:w-80">
              <h4 class="font-display font-extrabold text-[10px] md:text-xs tracking-[0.25em] text-white uppercase text-left">Newsletter</h4>
              <form id="footer-news" class="flex items-center gap-2 bg-slate-900 border border-slate-800 focus-within:border-primary-500 rounded-md p-1 w-full shadow-sm">
                <input type="email" placeholder="Enter your email here..." required class="bg-transparent border-none outline-none py-1.5 px-3 text-xs md:text-sm w-full text-white placeholder-slate-500 focus:placeholder-slate-400" />
                <button type="submit" class="bg-primary-600 text-white text-xs md:text-sm font-semibold py-2 px-5 rounded-md hover:bg-primary-700 transition-colors">
                  Subscribe
                </button>
              </form>
            </div>
          </div>

          <!-- Main Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8 mb-8">
            
            <!-- Column 1: Brand & Contact Info -->
            <div class="space-y-4">
              <div class="flex items-center gap-2">
                <img src="/image/blueskye logo.png" alt="BlueSky City Homes" class="h-24 w-auto object-contain" />
              </div>
              
              <div class="space-y-3 text-xs md:text-sm text-slate-300 pt-2 font-medium">
                <div class="flex items-center gap-2.5">
                  <i data-lucide="phone" class="w-4 h-4 text-primary-500"></i>
                  <span>+234 123 4567</span>
                </div>
                <div class="flex items-center gap-2.5">
                  <i data-lucide="mail" class="w-4 h-4 text-primary-500"></i>
                  <span>support@blueskye.com</span>
                </div>
                <div class="flex items-center gap-2.5">
                  <i data-lucide="map-pin" class="w-4 h-4 text-primary-500"></i>
                  <span>123 Main Street, Lagos</span>
                </div>
              </div>
            </div>

            <!-- Column 2: Quick Links -->
            <div class="space-y-4">
              <h4 class="font-display font-extrabold text-[10px] md:text-xs tracking-[0.25em] text-white uppercase pb-1.5 border-b border-slate-900">
                Quick Links
              </h4>
              <ul class="space-y-2 text-xs md:text-sm text-slate-300 font-medium">
                <li><a href="#home" class="hover:text-white transition-colors duration-200 block">Home</a></li>
                <li><a href="#properties" class="hover:text-white transition-colors duration-200 block">Properties</a></li>
                <li><a href="#about" class="hover:text-white transition-colors duration-200 block">About Us</a></li>
                <li><a href="#blog" class="hover:text-white transition-colors duration-200 block">Blog</a></li>
                <li><a href="#contact" class="hover:text-white transition-colors duration-200 block">Contact</a></li>
              </ul>
            </div>

            <!-- Column 3: Policies -->
            <div class="space-y-4">
              <h4 class="font-display font-extrabold text-[10px] md:text-xs tracking-[0.25em] text-white uppercase pb-1.5 border-b border-slate-900">
                Policies
              </h4>
              <ul class="space-y-2 text-xs md:text-sm text-slate-300 font-medium">
                <li><a href="#privacy" class="hover:text-white transition-colors duration-200 block">Cookies policy</a></li>
                <li><a href="#privacy" class="hover:text-white transition-colors duration-200 block">Privacy Policy</a></li>
                <li><a href="#terms" class="hover:text-white transition-colors duration-200 block">Terms of Service</a></li>
              </ul>
            </div>

            <!-- Column 4 & 5: Google Map Iframe (Bigger size, no grayscale) -->
            <div class="lg:col-span-2 space-y-4">
              <h4 class="font-display font-extrabold text-[10px] md:text-xs tracking-[0.25em] text-white uppercase pb-1.5 border-b border-slate-900">
                Our Office
              </h4>
              <div class="w-full h-64 rounded border border-slate-900/60 overflow-hidden shadow-md">
                <iframe 
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3964.7282631558296!2d3.4357597147702036!3d6.428055495349272!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103bf53280e55097%3A0x24d864197e4113!2sLekki%20Phase%201%2C%20Lagos!5e0!3m2!1sen!2sng!4v1625567890123!5m2!1sen!2sng"
                  class="w-full h-full border-none outline-none"
                  style="border:0;"
                  allowfullscreen="" 
                  loading="lazy">
                </iframe>
              </div>
            </div>

          </div>

          <!-- Bottom copyright section (High contrast, bold, less padding below) -->
          <div class="pt-6 border-t border-slate-900 text-center text-xs md:text-sm text-slate-200 font-bold uppercase tracking-wider">
            <p>©2026 <span class="text-primary-500 font-extrabold">Blueskye</span>. All rights reserved.</p>
          </div>

        </div>
      </footer>
      
      <!-- Modals & Drawers -->
      <div id="comparison-drawer-container"></div>
      <div id="detail-modal-container"></div>
      <div id="comparison-modal-container"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
