<form id="modal-aff-register" class="space-y-4">
  <div class="text-center space-y-2">
    <img src="/image/blueskye logo.png" alt="BlueSky City Homes" class="h-14 w-auto mx-auto object-contain mb-3" />
    <span class="text-primary-600 dark:text-primary-400 uppercase tracking-[0.2em] text-[9px] font-black">Affiliate Partner</span>
    <h2 class="font-display font-extrabold text-xl text-slate-900 dark:text-white leading-tight">Partner Registration</h2>
    <p class="text-[10px] text-slate-450 dark:text-slate-500 font-light max-w-[240px] mx-auto">Join Nigeria's most elite real estate referral network.</p>
  </div>
  
  <div class="space-y-3 pt-2">
    <div class="space-y-1">
      <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Full Name</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
          <i class="bx bx-user text-sm"></i>
        </span>
        <input type="text" id="modal-aff-name" placeholder="Aliyu Bello" required class="form-input text-xs pl-9 bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
      <div class="space-y-1">
        <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Email</label>
        <input type="email" id="modal-aff-email" placeholder="partner@domain.com" required class="form-input text-xs bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
      <div class="space-y-1">
        <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Phone</label>
        <input type="tel" id="modal-aff-phone" placeholder="+234..." required class="form-input text-xs bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
      <div class="space-y-1">
        <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Password</label>
        <input type="password" id="modal-aff-password" placeholder="••••••••" required class="form-input text-xs bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
      <div class="space-y-1">
        <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Source Channel</label>
        <select id="modal-aff-source" class="form-input text-xs bg-slate-50/50 cursor-pointer dark:bg-slate-950 text-slate-850 dark:text-white h-[38px] py-1 px-2.5 rounded border border-slate-200 dark:border-slate-800">
          <option value="Social Media">Social Media</option>
          <option value="Search Engine">Search Engine</option>
          <option value="Direct Broker">Direct Broker</option>
          <option value="Friend / Referral">Friend / Referral</option>
        </select>
      </div>
    </div>
  </div>
  
  <button type="submit" class="btn btn-md btn-primary w-full justify-center mt-3 shadow-md shadow-primary-600/10 active:scale-98 inline-flex items-center gap-1.5">
    Register Partner <i class="bx bx-right-arrow-alt text-base"></i>
  </button>
  
  <div class="text-center pt-2 border-t border-slate-100 dark:border-slate-850">
    <button type="button" id="toggle-aff-to-login" class="text-xs text-primary-650 dark:text-primary-400 hover:underline font-semibold">
      Already a partner? Login
    </button>
  </div>
</form>
