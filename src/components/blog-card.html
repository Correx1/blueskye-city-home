<div class="bg-white dark:bg-slate-900/40 border border-slate-100 dark:border-slate-850 rounded-xl sm:rounded-2xl overflow-hidden flex flex-col justify-between shadow-sm hover:shadow-lg transition-all duration-300 group hover:-translate-y-1 h-full">
  <div>
    <a href="#blog-detail?id={{id}}" class="block relative overflow-hidden aspect-16/10">
      <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
      <div class="absolute top-2 left-2 sm:top-4 sm:left-4 bg-slate-900/70 backdrop-blur-md text-white text-[7px] sm:text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 sm:px-2.5 sm:py-1 rounded-full border border-white/10 shadow">
        {{category}}
      </div>
    </a>
    <div class="p-3 sm:p-5 space-y-2 sm:space-y-3">
      <a href="#blog-detail?id={{id}}" class="block group-hover:text-primary-600 transition-colors">
        <h3 class="font-display font-extrabold text-xs sm:text-base text-slate-800 dark:text-white leading-tight">
          {{title}}
        </h3>
      </a>
      <p class="text-[11px] sm:text-xs text-slate-500 dark:text-slate-400 font-light leading-relaxed line-clamp-3">
        {{excerpt}}
      </p>
    </div>
  </div>
  
  <!-- Footer with Calendar Date and Read More Button -->
  <div class="p-3 sm:p-5 pt-0 flex items-center justify-between mt-auto">
    <div class="flex items-center gap-1.5 text-slate-400 dark:text-slate-400">
      <i class="bx bx-calendar text-primary-600 dark:text-primary-400 text-sm"></i>
      <span class="text-[9px] sm:text-[10px] font-semibold tracking-wider uppercase">{{date}}</span>
    </div>
    <a href="#blog-detail?id={{id}}" class="inline-flex items-center bg-primary-600 hover:bg-primary-700 text-white rounded-full pl-3.5 pr-1 py-1 gap-2 text-[10px] font-bold uppercase tracking-wider transition-all duration-300 shadow-sm active:scale-95">
      Read More
      <span class="h-5 w-5 rounded-full bg-white flex items-center justify-center text-primary-600 shadow-sm">
        <i class="bx bx-chevron-right text-sm"></i>
      </span>
    </a>
  </div>
</div>
