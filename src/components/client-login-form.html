<form id="modal-client-login" class="space-y-4">
  <div class="text-center space-y-2">
    <img src="/image/blueskye logo.png" alt="Blueskye City Home" class="h-14 w-auto mx-auto object-contain mb-3" />
    <span class="text-primary-600 dark:text-primary-400 uppercase tracking-[0.2em] text-[9px] font-black">Secure Access</span>
    <h2 class="font-display font-extrabold text-xl text-slate-900 dark:text-white leading-tight">Welcome Back</h2>
    <p class="text-[10px] text-slate-450 dark:text-slate-500 font-light max-w-[240px] mx-auto">Access your saved property portfolio and escrow ledger.</p>
  </div>
  
  <div class="space-y-3 pt-2">
    <div class="space-y-1">
      <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Email Address</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
          <i class="bx bx-envelope text-sm"></i>
        </span>
        <input type="email" id="modal-login-email" placeholder="name@domain.com" required class="form-input text-xs pl-9 bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
    </div>
    
    <div class="space-y-1">
      <label class="text-[9px] font-bold text-slate-450 uppercase tracking-wider">Password</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
          <i class="bx bx-lock-alt text-sm"></i>
        </span>
        <input type="password" id="modal-login-password" placeholder="••••••••" required class="form-input text-xs pl-9 bg-slate-50/50 dark:bg-slate-950 text-slate-800 dark:text-white" />
      </div>
    </div>
  </div>
  
  <button type="submit" class="btn btn-md btn-primary w-full justify-center mt-3 shadow-md shadow-primary-600/10 active:scale-98">
    Sign In
  </button>
  
  <div class="text-center pt-2 border-t border-slate-100 dark:border-slate-850">
    <button type="button" id="toggle-client-to-register" class="text-xs text-primary-650 dark:text-primary-400 hover:underline font-semibold">
      Don't have an account? Register Now
    </button>
  </div>
</form>
