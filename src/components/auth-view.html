<div class="animate-fade-in max-w-sm mx-auto px-4 py-16">
  <div class="bg-white dark:bg-dark-surface border border-slate-200/60 dark:border-slate-800 p-8 rounded-md shadow-sm space-y-6">
    <div class="text-center space-y-2">
      <span class="text-primary-600 dark:text-primary-500 uppercase tracking-widest text-[9px] font-bold">Verify Identity</span>
      <h2 class="font-display font-extrabold text-xl text-slate-900 dark:text-white">Welcome Back</h2>
      <p class="text-[10px] text-slate-400 font-light">Access your saved collections and broker contacts.</p>
    </div>
    
    <form id="login-form" class="space-y-4">
      <div class="space-y-1">
        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Email address</label>
        <input type="email" placeholder="name@domain.com" required class="form-input" />
      </div>
      
      <div class="space-y-1">
        <div class="flex justify-between items-center">
          <label class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Password</label>
          <a href="#" class="text-[9px] text-primary-600 hover:text-primary-700 font-semibold tracking-wider uppercase">Forgot?</a>
        </div>
        <input type="password" placeholder="••••••••" required class="form-input" />
      </div>
      
      <button type="submit" class="btn btn-md btn-primary w-full justify-center">
        Sign In
      </button>
    </form>
  </div>
</div>
