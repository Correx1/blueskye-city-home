<div class="bg-white dark:bg-dark-surface rounded-md overflow-hidden shadow-md hover:shadow-2xl transition-all duration-300 group flex flex-col relative">
  <div class="relative h-56 w-full overflow-hidden">
    <img src="{{imageUrl}}" alt="{{title}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
    
    <!-- Badges Overlay -->
    <div class="absolute inset-x-4 top-4 flex items-center justify-between">
      <span class="px-2.5 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider text-white bg-primary-600 shadow-sm">
        {{status}}
      </span>
      
      <!-- Bookmark Button -->
      <button data-action="toggle-fav" data-id="{{id}}" class="h-8 w-8 rounded-full bg-white/90 hover:bg-white dark:bg-slate-900/80 dark:hover:bg-slate-850 text-slate-800 dark:text-white flex items-center justify-center shadow-md transition-transform active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 {{isFavoritedClass}}"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </button>
    </div>
    
    <div class="absolute bottom-4 left-4">
      <span class="px-2 py-0.5 rounded bg-black/60 text-white text-[9px] font-bold uppercase tracking-widest">{{type}}</span>
    </div>
  </div>
  
  <!-- Info Content -->
  <div class="p-5 flex-grow flex flex-col justify-between">
    <div class="space-y-2">
      <div class="flex items-center text-slate-400 dark:text-slate-500 gap-1 text-[10px] font-semibold">
        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-primary-600"></i> {{location}}, {{city}}
      </div>
      
      <h3 class="card-title" data-action="view-details" data-id="{{id}}">
        {{title}}
      </h3>
      
      <!-- Specs -->
      <div class="grid grid-cols-3 gap-2 py-2.5 border-y border-slate-100 dark:border-slate-800 text-[10px] text-slate-500">
        <div class="flex items-center gap-1"><i data-lucide="bed" class="w-3 h-3 text-slate-400"></i> <span>{{beds}} Beds</span></div>
        <div class="flex items-center gap-1"><i data-lucide="bath" class="w-3 h-3 text-slate-400"></i> <span>{{baths}} Baths</span></div>
        <div class="flex items-center gap-1"><i data-lucide="maximize" class="w-3 h-3 text-slate-400"></i> <span>{{area}} Sqft</span></div>
      </div>
    </div>
    
    <!-- Actions footer -->
    <div class="flex items-center justify-between pt-3 mt-2">
      <div class="text-slate-900 dark:text-white font-display font-bold text-xs">
        {{formattedPrice}}
      </div>
      
      <div class="flex items-center gap-1.5">
        <button data-action="toggle-compare" data-id="{{id}}" class="p-2 rounded-md hover:bg-slate-50 transition-colors text-[9px] font-bold" title="Compare">
          {{compareIconSvg}}
        </button>
        <button data-action="view-details" data-id="{{id}}" class="btn btn-sm btn-outline">
          Details
        </button>
        <button data-action="purchase-direct" data-id="{{id}}" class="btn btn-sm btn-primary">
          {{purchaseCtaText}}
        </button>
      </div>
    </div>
  </div>
</div>
