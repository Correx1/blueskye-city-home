<div class="fixed bottom-0 inset-x-0 z-40 bg-white dark:bg-dark-surface border-t border-slate-200 dark:border-slate-855 shadow-[0_-8px_20px_rgba(0,0,0,0.06)] animate-fade-in">
  <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3">
    
    <div class="flex items-center gap-2">
      <div class="h-8 w-8 rounded-md bg-primary-600/10 text-primary-600 flex items-center justify-center">
        <i data-lucide="git-compare" class="w-4 h-4"></i>
      </div>
      <div>
        <h4 class="font-display font-bold text-[10px] text-slate-800 dark:text-white uppercase tracking-wider">Comparison List</h4>
        <p class="text-[9px] text-slate-400">Select up to 3 listings to compare.</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2 flex-wrap">
      <!-- SELECTED_ITEMS -->
    </div>
    
    <div class="flex items-center gap-2 w-full sm:w-auto">
      <button id="clear-compare" class="text-[10px] uppercase font-bold tracking-widest text-slate-400 hover:text-slate-600 px-3 py-2 rounded-md">
        Clear
      </button>
      <button id="trigger-compare-modal" class="btn btn-sm btn-primary">
        Compare Now ({{selectedCount}}/3)
      </button>
    </div>
  </div>
</div>
