<!-- PROJECTS_LIST -->
<template id="projects-list-template">
  <div class="space-y-6 animate-fade-in text-slate-800 dark:text-slate-200">
    <div class="border-b border-slate-200/20 pb-3 flex items-center justify-between">
      <div>
        <h3 class="text-sm font-black uppercase tracking-wider text-slate-855 dark:text-white">Development Projects</h3>
        <p class="text-xs text-slate-500 mt-1">List of all BlueSky development projects. Each project groups multiple properties/plots.</p>
      </div>
      <button id="add-new-project-btn" class="btn btn-md btn-primary flex items-center gap-1.5 active:scale-98">
        <i class="bx bx-plus text-sm"></i>
        <span>Add New Project</span>
      </button>
    </div>

    <!-- Actions Bar (Search/Filter) -->
    <div class="flex flex-col sm:flex-row items-center gap-3 max-w-xl">
      <div class="relative flex-1 w-full">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
          <i class="bx bx-search text-sm"></i>
        </span>
        <input type="text" id="admin-search-projects" placeholder="Search project name or location..." class="w-full form-input text-xs pl-9 bg-white dark:bg-slate-900 text-slate-855 dark:text-white" />
      </div>
      <select id="filter-project-stage" class="form-input text-xs bg-white dark:bg-slate-900 text-slate-855 dark:text-white shrink-0 sm:w-40 w-full">
        <option value="all">All Stages</option>
        <option value="Planning">Planning</option>
        <option value="Development">Development</option>
        <option value="Pre-Launch">Pre-Launch</option>
        <option value="Launch">Launch</option>
        <option value="Allocation">Allocation</option>
      </select>
    </div>

    <!-- Projects Grid/Table -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm border-collapse">
          <thead>
            <tr class="bg-slate-50 dark:bg-slate-955 border-b border-slate-200/20 text-slate-400 uppercase tracking-wider font-semibold text-xs">
              <th class="p-4">Project</th>
              <th class="p-4">Location</th>
              <th class="p-4">Plots Breakdown</th>
              <th class="p-4">Current Stage</th>
              <th class="p-4">Site Manager</th>
              <th class="p-4">Date Created</th>
              <th class="p-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-projects-table-body" class="divide-y divide-slate-100 dark:divide-slate-850">
            <!-- DYNAMIC PROJECTS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</template>

<!-- PROJECTS_ADD_EDIT -->
<template id="projects-add-edit-template">
  <div class="space-y-6 animate-fade-in text-slate-855 dark:text-slate-200 w-full">
    <div class="flex items-center justify-between border-b border-slate-200/20 pb-3">
      <div>
        <h3 id="project-form-title-text" class="text-sm font-black uppercase tracking-wider text-slate-900 dark:text-white">Modify Development Project</h3>
        <p class="text-xs text-slate-500 mt-1">Configure development plots, timeline phases, site managers, and media resources.</p>
      </div>
      <button id="cancel-project-btn" class="bg-[#1e3a8a] text-white hover:bg-blue-800 transition-all font-bold px-4 py-2 rounded text-xs flex items-center gap-1.5 active:scale-98">
        <i class="bx bx-left-arrow-alt text-sm"></i>
        <span>Back to Projects</span>
      </button>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 items-start w-full">
      <!-- Left Side: Form -->
      <div class="xl:col-span-2 bg-white dark:bg-slate-900 border border-slate-200/50 dark:border-slate-800 rounded-md p-5 space-y-5">
        <form id="project-full-form" class="space-y-5">
          <input type="hidden" id="project-edit-id" value="" />

          <!-- Group 1: Basic Info -->
          <div class="border-b border-slate-100 dark:border-slate-800 pb-3">
            <h4 class="text-xs font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 mb-4">Basic Information</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-1.5">
                <label class="text-xs font-semibold uppercase tracking-wider flex items-center gap-1">Project Name <span class="text-rose-500">*</span></label>
                <input type="text" id="form-project-title" required class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-850 dark:text-white" />
                <div id="err-proj-title" class="text-[10px] text-rose-500 font-semibold hidden">Project name is required.</div>
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-semibold uppercase tracking-wider flex items-center gap-1">Site Manager <span class="text-rose-500">*</span></label>
                <select id="form-project-manager" class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white">
                  <option value="Aliyu Bello">Aliyu Bello (Site Inspector Manager)</option>
                  <option value="Chidi Egwu">Chidi Egwu (Land Acquisition Lead)</option>
                  <option value="Aisha Bello">Aisha Bello (Senior Realtor Manager)</option>
                  <option value="Tolani Alao">Tolani Alao (Relationship Manager)</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
              <div class="space-y-1.5">
                <label class="text-xs font-semibold uppercase tracking-wider flex items-center gap-1">Location / Address <span class="text-rose-500">*</span></label>
                <input type="text" id="form-project-location" required class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-850 dark:text-white" />
                <div id="err-proj-location" class="text-[10px] text-rose-500 font-semibold hidden">Location address is required.</div>
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-semibold uppercase tracking-wider flex items-center gap-1">Total Plots <span class="text-rose-500">*</span></label>
                <input type="number" id="form-project-total-plots" required class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white" />
                <div id="err-proj-plots" class="text-[10px] text-rose-500 font-semibold hidden">Total Plots must be a valid number.</div>
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-semibold uppercase tracking-wider">Development Stage</label>
                <select id="form-project-stage" class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white">
                  <option value="Planning">Planning</option>
                  <option value="Development">Development</option>
                  <option value="Pre-Launch">Pre-Launch</option>
                  <option value="Launch">Launch</option>
                  <option value="Allocation">Allocation</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Group 2: Description & Specs -->
          <div class="border-b border-slate-100 dark:border-slate-800 pb-3">
            <h4 class="text-xs font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 mb-4">Specs & Detailed Narrative</h4>
            
            <div class="space-y-1.5">
              <label class="text-xs font-semibold uppercase tracking-wider flex items-center gap-1">Description <span class="text-rose-500">*</span></label>
              <textarea id="form-project-desc" rows="3" placeholder="Describe boundaries, infrastructure plans, water drainage, fiber networks..." class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white min-h-[70px]"></textarea>
              <div id="err-proj-desc" class="text-[10px] text-rose-500 font-semibold hidden">Description text is required.</div>
            </div>

            <div class="space-y-1.5 mt-4">
              <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-855 pb-1">
                <label class="text-xs font-bold uppercase tracking-wider">Project Zoning Specs & Attributes</label>
                <button type="button" id="add-project-detail-row-btn" class="bg-[#1e3a8a] text-white hover:bg-blue-800 font-bold px-2 py-1 rounded text-[10px] flex items-center gap-0.5 active:scale-98"><i class="bx bx-plus text-xs"></i>Add Spec</button>
              </div>
              <div id="project-custom-details-container" class="space-y-2 mt-2">
                <!-- DYNAMIC DETAILS -->
              </div>
            </div>
          </div>

          <!-- Group 3: Media Gallery -->
          <div class="space-y-4">
            <h4 class="text-xs font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 mb-2">Media Gallery & Embeds</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-wider">Google Maps Embed URL</label>
                <input type="text" id="form-project-map-url" class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white" placeholder="https://www.google.com/maps/embed?pb=..." />
              </div>
              <div class="space-y-2">
                <label class="text-xs font-semibold uppercase tracking-wider">Video Tour URL</label>
                <input type="text" id="form-project-video" class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white" placeholder="https://youtube.com/embed/..." />
              </div>
            </div>

            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase tracking-wider">Photos Gallery Uploads</label>
              <div class="border border-dashed border-slate-300 dark:border-slate-700 rounded-lg p-4 flex flex-col items-center justify-center text-center space-y-2 bg-slate-50/50 dark:bg-slate-955/20">
                <i class="bx bx-image-add text-2xl text-slate-400"></i>
                <button type="button" id="trigger-project-photos-upload" class="bg-[#1e3a8a] text-white hover:bg-blue-800 font-bold px-3 py-1 rounded text-[11px] active:scale-98">Browse Photos</button>
                <input type="file" id="project-photos-input" multiple accept="image/*" class="hidden" />
              </div>
              <input type="text" id="form-project-gallery" placeholder="Main Layout Display URL" class="form-input py-2 text-xs bg-slate-50 dark:bg-slate-955 text-slate-855 dark:text-white" />
              <div id="project-photos-preview-container" class="flex flex-wrap gap-2 pt-1">
                <!-- PHOTO PREVIEWS -->
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3 pt-3 border-t border-slate-100 dark:border-slate-850">
            <button type="submit" id="project-form-submit-btn" class="bg-[#1e3a8a] text-white hover:bg-blue-800 transition-all font-bold py-2.5 px-6 rounded text-xs active:scale-98">Publish Layout Project</button>
            <button type="button" id="cancel-project-form-btn" class="bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-755 text-slate-800 dark:text-slate-200 transition-all font-bold py-2.5 px-6 rounded text-xs active:scale-98">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Right Side: Live Preview -->
      <div class="xl:col-span-1 bg-white dark:bg-slate-900 border border-slate-200/50 dark:border-slate-800 rounded-md p-4 space-y-3 sticky top-6 shadow-none">
        <div class="border-b border-slate-100 dark:border-slate-855 pb-1">
          <h4 class="text-xs font-black uppercase tracking-wider">Live Project Preview Card</h4>
        </div>
        <div id="project-live-preview-container" class="border border-slate-200/50 dark:border-slate-800 rounded-lg overflow-hidden bg-slate-50/20 dark:bg-slate-955/10">
          <div class="relative h-40 w-full bg-slate-100 dark:bg-slate-955 flex items-center justify-center overflow-hidden">
            <img id="prev-project-img" src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=800&q=80" class="h-full w-full object-cover" />
            <span id="prev-project-stage" class="absolute top-2.5 left-2.5 px-2 py-0.5 rounded-full text-[8px] font-black bg-[#1e3a8a] text-white uppercase tracking-wider">Pre-Launch</span>
          </div>
          <div class="p-3.5 space-y-3.5">
            <div class="space-y-0.5">
              <h4 id="prev-project-title" class="text-xs font-black text-slate-855 dark:text-white tracking-wide uppercase leading-tight">New Project Title</h4>
              <p id="prev-project-location" class="text-[11px] text-slate-505 flex items-center gap-0.5"><i class="bx bx-map-pin"></i> Banana Island, Lagos</p>
            </div>
            <div class="border-t border-b border-slate-150/10 py-2 space-y-1.5">
              <div class="flex items-center justify-between text-[11px]">
                <span class="text-slate-505">Plot Sales Ratio:</span>
                <span id="prev-project-plots-ratio" class="font-bold text-[#1d4ed8]">0 / 40 Sold</span>
              </div>
              <div class="w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div id="prev-project-plots-bar" class="h-full bg-emerald-500" style="width: 0%"></div>
              </div>
            </div>
            <div class="space-y-1">
              <span class="text-[8px] font-bold text-slate-400 uppercase tracking-wider block">Zoning & Attributes</span>
              <div id="prev-project-features" class="grid grid-cols-1 gap-1 text-[11px] text-slate-655 dark:text-slate-350">
                <!-- DYNAMIC SPECS -->
              </div>
            </div>
            <div class="space-y-1 pt-1 border-t border-slate-150/10 flex items-center gap-2">
              <div class="h-7 w-7 rounded-full bg-[#1e3a8a] text-white flex items-center justify-center font-bold text-[10px] uppercase shadow-sm shrink-0" id="prev-project-manager-avatar">AB</div>
              <div>
                <h5 id="prev-project-manager-name" class="text-[11px] font-bold text-slate-855 dark:text-white">Aliyu Bello</h5>
                <p class="text-[9px] text-slate-455">Site Manager</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- PROJECT_DETAIL -->
<template id="project-detail-template">
  <div class="space-y-6 animate-fade-in text-slate-800 dark:text-slate-200">
    <!-- Header -->
    <div class="border-b border-slate-200/20 pb-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="detail-back-btn" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors text-xl" title="Back to Projects">
          <i class="bx bx-left-arrow-alt"></i>
        </button>
        <div>
          <h3 id="detail-project-title" class="text-sm font-black uppercase tracking-wider text-slate-855 dark:text-white">Project Detail</h3>
          <p id="detail-project-sub" class="text-xs text-slate-505 mt-1">Banana Island, Lagos | Stage: Pre-Launch</p>
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <span id="detail-project-stage-badge" class="px-2.5 py-0.5 rounded text-xs font-bold uppercase">Development</span>
        <button id="detail-edit-btn" class="btn btn-sm btn-primary flex items-center gap-1 active:scale-98">
          <i class="bx bx-edit text-xs"></i>
          <span>Edit Project</span>
        </button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl p-4 shadow-sm">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block font-semibold">Total Plots</span>
        <span id="stat-total-plots" class="text-lg font-semibold text-slate-800 dark:text-white">40</span>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl p-4 shadow-sm">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block font-semibold">Available Plots</span>
        <span id="stat-available-plots" class="text-lg font-semibold text-emerald-600 dark:text-emerald-400">10</span>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl p-4 shadow-sm">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block font-semibold">Reserved Plots</span>
        <span id="stat-reserved-plots" class="text-lg font-semibold text-amber-600 dark:text-amber-400">5</span>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl p-4 shadow-sm">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block font-semibold">Sold Plots</span>
        <span id="stat-sold-plots" class="text-lg font-semibold text-rose-600 dark:text-rose-455">25</span>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl p-4 shadow-sm col-span-1 sm:col-span-2 lg:col-span-1">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 block font-semibold">Total Revenue</span>
        <span id="stat-project-revenue" class="text-lg font-semibold text-slate-800 dark:text-white">₦0</span>
      </div>
    </div>

    <!-- Nested plots / properties table belonging to project -->
    <div class="space-y-3">
      <h4 class="text-xs font-black uppercase tracking-wider text-slate-700 dark:text-slate-350">Plots & Properties Catalog</h4>
      
      <div class="bg-white dark:bg-slate-900 border border-slate-200/20 rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm border-collapse">
            <thead>
              <tr class="bg-slate-50 dark:bg-slate-955 border-b border-slate-200/20 text-slate-400 uppercase tracking-wider font-semibold text-xs">
                <th class="p-4">Property Name</th>
                <th class="p-4">Location</th>
                <th class="p-4">Size</th>
                <th class="p-4">Price</th>
                <th class="p-4">Status</th>
                <th class="p-4">Date Added</th>
                <th class="p-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="detail-project-properties-tbody" class="divide-y divide-slate-100 dark:divide-slate-850">
              <!-- DYNAMIC ROWS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</template>
